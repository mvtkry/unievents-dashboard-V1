{% extends "base.html" %}

{% block content %}
<div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-800">Add New Participant</h1>
    <p class="text-gray-600">Register a single entry into the system database</p>
</div>

<div class="max-w-xl mx-auto bg-white rounded-xl shadow-lg p-8">
    <form action="/single-entry" method="POST" class="space-y-6">
        <div>
            <label class="block text-gray-700 font-bold mb-2">Full Name</label>
            <input type="text" name="name" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 border-gray-300" placeholder="e.g. Jane Doe" required>
        </div>

        <div>
            <label class="block text-gray-700 font-bold mb-2">Email Address</label>
            <input type="email" name="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 border-gray-300" placeholder="jane.doe@example.com" required>
        </div>

        <div>
            <label class="block text-gray-700 font-bold mb-2">Department</label>
            <select name="department" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white border-gray-300" required>
                <option value="">-- Select Department --</option>
                <option value="Engineering">Engineering</option>
                <option value="Design">Design</option>
                <option value="Marketing">Marketing</option>
                <option value="Sales">Sales</option>
                <option value="Finance">Finance</option>
                <option value="Human Resources">Human Resources</option>
            </select>
        </div>

        <div class="pt-4 border-t border-gray-100 flex gap-4">
            <button type="submit" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow transition">
                Register Participant
            </button>
            <button type="reset" class="px-6 py-3 border rounded-lg text-gray-500 hover:bg-gray-50">Reset</button>
        </div>
    </form>
</div>
{% endblock %}
